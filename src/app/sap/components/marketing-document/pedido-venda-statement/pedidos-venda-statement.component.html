<section class="content">
  <div class="card card-primary" [hidden]="lista?.selectedDocumentList">
    <div class="card-header">
      <h3 class="card-title"><b>Pedidos - {{ lista?.nomeUsuario }}</b></h3>
    </div>
    <div class="card-body">
      <div class="row align-items-end mb-3">
        <div class="col-md-3">
          <label class="font-weight-bold">Data (a partir de)</label>
          <input type="date" class="form-control" [value]="dataFiltro" (change)="onDataChange($event)">
        </div>
        <div class="col-md-2">
          <label class="font-weight-bold">Status</label>
          <select class="form-control" (change)="onStatusChange($event)">
            <option value="">Todos</option>
            <option *ngFor="let s of statusOptions" [value]="s.key" [selected]="s.key === 'bost_Open'">{{ s.label }}</option>
          </select>
        </div>
        <div class="col-md-3">
          <app-branch-select [selected]="filialSelecionada?.Bplid" (selectedOut)="onFilialChange($event)"></app-branch-select>
        </div>
        <div class="col-md-4">
          <app-busines-partner-search (selected)="onClienteChange($event)"></app-busines-partner-search>
        </div>
      </div>
    </div>
  </div>

  <app-marketing-document-list
    #lista
    [service]="pedidosVendaService"
    [title]="'Pedidos'"
    [showCard]="false">
  </app-marketing-document-list>
</section>
