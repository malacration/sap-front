
<section class="content">
  <div class="card card-primary" *ngIf="showList()">
    <div class="card-header">
            <h3 class="card-title"><b>Ordem de Carregamento</b></h3>
            <div class="card-tools float-right">
                <button (click)="novo()" type="button" class="btn btn-success">
                    Novo
                </button>
            </div>
    </div>
    <div class="card-body">
      <form class="container-fluid px-0" (ngSubmit)="filtrar()" autocomplete="off">
        <div class="form-row align-items-end">
          <div class="col-md-2 col-sm-6">
            <label for="filtroId" class="col-form-label">ID</label>
            <input
              id="filtroId"
              name="filtroId"
              class="form-control"
              type="text"
              [(ngModel)]="filtroId"
              placeholder="Ex.: 123"
            />
          </div>
          <div class="col-md-3 col-sm-6">
            <label for="filtroStatus" class="col-form-label">Status</label>
            <select
              id="filtroStatus"
              name="filtroStatus"
              class="form-control"
              [(ngModel)]="filtroStatus"
            >
              <option value="">Todos</option>
              <option *ngFor="let status of statusOptions" [value]="status">{{ status }}</option>
            </select>
          </div>
          <div class="col-md-3 col-sm-6">
            <label for="filtroCreateDateFrom" class="col-form-label">Criado de</label>
            <input
              id="filtroCreateDateFrom"
              name="filtroCreateDateFrom"
              class="form-control"
              type="date"
              [(ngModel)]="filtroCreateDateFrom"
            />
          </div>
          <div class="col-md-3 col-sm-6">
            <label for="filtroCreateDateTo" class="col-form-label">Criado até</label>
            <input
              id="filtroCreateDateTo"
              name="filtroCreateDateTo"
              class="form-control"
              type="date"
              [(ngModel)]="filtroCreateDateTo"
            />
          </div>
          <div class="col-auto">
            <div class="btn-group d-flex">
              <button type="submit" [disabled]="loading" class="btn btn-success">
                {{ loading ? '...' : 'Filtrar' }}
              </button>
              <button type="button" (click)="limparFiltros()" [disabled]="loading" class="btn btn-outline-secondary">
                Limpar
              </button>
            </div>
          </div>
        </div>
      </form>
      <hr>
      <ordem-carregamento-list
            [pageContent]="pageContent"
            [pageChangeFn]="pageChangeHandler"
            (actionOutput)="action($event)">
      </ordem-carregamento-list>
    </div>
    <div *ngIf="loading" class="overlay">
      <i class="fas fa-2x fa-sync-alt fa-spin"></i>
    </div>
  </div>

  <div *ngIf="showView()">
    <app-ordem-selected
      [selected]="selected"
      (back)="handleFormBack()"
      (atualizaPedidos)="handleOrdemSelection($event)"
    ></app-ordem-selected>
  </div>

  <div *ngIf="showEdit()">
    <app-ordem-formulario
      [ordemCarregamento]="selected"
      (back)="handleFormBack()"
    ></app-ordem-formulario>
  </div>
</section>
